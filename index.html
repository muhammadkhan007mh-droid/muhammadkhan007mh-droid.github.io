<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Online Store</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: #111;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .products {
      display: flex;
      justify-content: center;
      padding: 30px 15px;
    }

    .product-card {
      background: white;
      width: 320px;
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }

    .product-card img {
      width: 100%;
      border-radius: 10px;
    }

    .product-card h2 {
      font-size: 22px;
      margin: 15px 0 10px;
    }

    .price {
      color: #e63946;
      font-size: 24px;
      font-weight: bold;
      margin: 15px 0;
    }

    .buy-btn {
      display: block;
      background: #111;
      color: white;
      text-decoration: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
    }

    .buy-btn:hover {
      background: #333;
    }
  </style>
</head>

<body>

  <header>
    <h1>My Online Store</h1>
    <p>Best Products at Best Prices</p>
  </header>

  <section class="products">

    <div class="product-card">

      <img src="IMG-20260723-WA0010.jpg" 
           alt="Samsung Galaxy S26 Ultra 512GB">

      <h2>Samsung Galaxy S26 Ultra 512GB</h2>

      <p>
        Unlocked Android Smartphone, Black,
        Galaxy AI, AI Camera, Super Fast Charging,
        Durable Battery
      </p>

      <div class="price">
        PKR 387,740.90
      </div>

      <a href="https://wa.me/923XXXXXXXXX?text=I%20want%20to%20order%20Samsung%20Galaxy%20S26%20Ultra"
         class="buy-btn">
        Buy Now
      </a>

    </div>

  </section>

</body>
</html>
