<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Website</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f7fb;
            color: #222;
        }

        header {
            background: #111827;
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 32px;
            margin-bottom: 8px;
        }

        header p {
            color: #d1d5db;
        }

        .hero {
            text-align: center;
            padding: 80px 20px;
            background: white;
        }

        .hero h2 {
            font-size: 40px;
            margin-bottom: 15px;
            color: #111827;
        }

        .hero p {
            font-size: 18px;
            color: #555;
            margin-bottom: 30px;
        }

        .button {
            display: inline-block;
            padding: 14px 28px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 17px;
        }

        .button:hover {
            background: #1d4ed8;
        }

        .about {
            padding: 60px 20px;
            text-align: center;
        }

        .about h2 {
            font-size: 30px;
            margin-bottom: 15px;
        }

        .about p {
            max-width: 600px;
            margin: auto;
            line-height: 1.7;
            color: #555;
        }

        footer {
            margin-top: 30px;
            background: #111827;
            color: white;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>

<body>

    <header>
        <h1>My Website</h1>
        <p>Welcome to my official website</p>
    </header>

    <section class="hero">
        <h2>Welcome to My Website</h2>
        <p>My website is now live on GitHub Pages!</p>

        <a href="#about" class="button">Learn More</a>
    </section>

    <section class="about" id="about">
        <h2>About Me</h2>
        <p>
            Hello! Welcome to my website.
            This website is created using HTML and CSS
            and hosted with GitHub Pages.
        </p>
    </section>

    <footer>
        <p>© 2026 My Website. All Rights Reserved.</p>
    </footer>

</body>
</html>
